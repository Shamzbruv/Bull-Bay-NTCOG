<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBS Transparent Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="overlay.css">
</head>
<body>
    <div id="overlay-container" class="hidden">
        <div class="overlay-box">
            <h1 id="event-title">Event Title</h1>
            
            <div id="countdown-wrap">
                <div role="timer" id="countdown">
                    <span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span><span class="colon">:</span><span id="seconds">00</span>
                </div>
            </div>
            
            <div id="status-wrap" class="hidden">
                <span id="status-text">Starting Soon</span>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="overlay.js"></script>
</body>
</html>
